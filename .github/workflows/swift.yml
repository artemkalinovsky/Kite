name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          # Windows disabled: swift-actions/setup-swift@v2 has broken Windows support
          # Re-enable once setup-swift@v3 ships (https://github.com/swift-actions/setup-swift/issues/709)
          # - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Swift
        if: runner.os != 'macOS'
        uses: swift-actions/setup-swift@v2

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v

  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test on Android (aarch64, API 24)
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "latest"
          free-disk-space: true
